name: Publish

# Publishes to PyPI when a GitHub Release is published.
#
# To enable:
#   1. Configure a PyPI "trusted publisher" for this repo
#      (https://docs.pypi.org/trusted-publishers/) — no API token/secret needed.
#   2. Set a repo variable PYPI_PUBLISH=true
#      (Settings → Secrets and variables → Actions → Variables).
# Until then the job is skipped, so releases don't trigger a failing publish.

on:
  release:
    types: [published]

jobs:
  pypi:
    if: ${{ vars.PYPI_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
